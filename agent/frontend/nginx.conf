# nginx reverse-proxy config for the Energized frontend container.
# Proxies API calls so the browser never hits backends directly.

server {
    listen 80;
    server_name _;

    # ── Serve the React SPA ──────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Any route not matching a static file → hand to React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: Agent Backend  /api/* → agent-backend:8000 ───────────────────
    location /api/ {
        proxy_pass         http://agent-backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Keep SSE (Server-Sent Events) connections alive
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ── Proxy: RAG Backend  /rag/api/* → rag-backend:8001 ───────────────────
    location /rag/api/ {
        proxy_pass         http://rag-backend:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ── Health check endpoint (used by Docker healthcheck) ───────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
