name: Energized CI/CD

on:
  push:
    branches:
      - main
      - Development

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python linters
        run: pip install flake8

      - name: Flake8 — rag/
        run: |
          flake8 rag/ \
            --max-line-length=120 \
            --extend-ignore=E221,E251,E272,E401,E501,E701,W292,E302,F401,F541

      - name: Flake8 — agent/backend/
        run: |
          flake8 agent/backend/ \
            --max-line-length=120 \
            --extend-ignore=E221,E251,E272,E401,E501,E701,W292,E302,F401,F541

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: agent/frontend
        run: npm ci

      - name: ESLint — agent/frontend/src/
        working-directory: agent/frontend
        run: npx eslint src/

  # ── 2. Security ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Bandit scan — rag/ and agent/backend/
        run: |
          bandit -r rag/ agent/backend/ \
            --severity-level medium \
            --format json \
            --output bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── 3. Smoke Tests ─────────────────────────────────────────────────────────
  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: security
    env:
      IMAGE_TAG: ${{ github.sha }}${{ github.ref_name == 'Development' && '-staging' || '' }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build images for test
        run: |
          docker build -f Dockerfile.rag \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/energized-rag:${IMAGE_TAG} .
          docker build -f Dockerfile.agent-backend \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/energized-agent-backend:${IMAGE_TAG} .
          docker build -f Dockerfile.frontend \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/energized-frontend:${IMAGE_TAG} .

      - name: Write .env for compose
        run: |
          cat <<EOF > .env
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          IMAGE_TAG=${IMAGE_TAG}
          EOF

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost/rag/api/health && \
               curl -sf http://localhost/api/health; then
              echo "All services healthy"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 5s..."
            sleep 5
          done
          echo "Services failed to become healthy"
          docker compose logs
          exit 1

      - name: Run smoke tests
        run: pytest tests/test_health.py -v

      - name: Tear down
        if: always()
        run: docker compose down

  # ── 4. Build & Push ────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_TAG: ${{ github.sha }}${{ github.ref_name == 'Development' && '-staging' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push — rag-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.rag
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/energized-rag:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/energized-rag:latest

      - name: Build & push — agent-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agent-backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/energized-agent-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/energized-agent-backend:latest

      - name: Build & push — frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/energized-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/energized-frontend:latest

  # ── 5. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render + Reload nginx
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploys
        run: |
          curl -sf -X POST "${{ secrets.RENDER_HOOK_RAG }}"
          curl -sf -X POST "${{ secrets.RENDER_HOOK_AGENT }}"
          curl -sf -X POST "${{ secrets.RENDER_HOOK_FRONTEND }}"

      - name: Upload nginx.conf to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_VM_HOST }}
          username: ${{ secrets.AWS_VM_USER }}
          key: ${{ secrets.AWS_VM_SSH_KEY }}
          source: nginx/nginx.conf
          target: /tmp/nginx.conf
          strip_components: 1

      - name: Reload nginx on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_VM_HOST }}
          username: ${{ secrets.AWS_VM_USER }}
          key: ${{ secrets.AWS_VM_SSH_KEY }}
          script: |
            sudo cp /tmp/nginx.conf /etc/nginx/nginx.conf
            sudo nginx -t
            sudo nginx -s reload