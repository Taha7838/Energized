# nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Upstream definitions ────────────────────────────────────────────────
    upstream rag_backend {
        server rag-backend:8001;
    }

    upstream agent_backend {
        server agent-backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── Main server block ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;  # accepts raw IP, any hostname

        # ── RAG API ──────────────────────────────────────────────────────────
        # Strips /rag/api prefix before forwarding to rag-backend.
        # e.g. /rag/api/upload  →  rag-backend:8001/upload
        # e.g. /rag/api/query   →  rag-backend:8001/query
        # e.g. /rag/api/health  →  rag-backend:8001/health
        location /rag/api/ {
            proxy_pass         http://rag_backend/;  # trailing slash strips the prefix
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # File uploads — RAG accepts PDFs, don't let nginx reject large files
            client_max_body_size 50M;

            # Disable read timeout for large PDF ingestion
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Agent API (SSE-aware) ─────────────────────────────────────────────
        # /api/ → agent-backend:8000 (no prefix stripping — paths match 1:1)
        location /api/ {
            proxy_pass         http://agent_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # ── SSE support ────────────────────────────────────────────────
            # Required for /api/v1/query/stream to work.
            # Without these, nginx buffers the stream and the client sees
            # nothing until the entire response completes.
            proxy_buffering            off;
            proxy_cache                off;
            proxy_set_header           Connection '';
            chunked_transfer_encoding  on;
            add_header                 X-Accel-Buffering no;  # tells nginx not to buffer even at proxy level

            proxy_read_timeout 300s;  # SSE connections are long-lived
            proxy_send_timeout 300s;
        }

        # ── React SPA (catch-all) ─────────────────────────────────────────────
        # All other routes go to the frontend container.
        # This covers /, /rag, /researcher, and any client-side routes.
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}