events {
    worker_connections 1024;
}

http {
    # ── Upstream services on Render ──────────────────────────────────────────
    upstream rag_backend {
        server energized-rag.onrender.com:443;
    }

    upstream agent_backend {
        server energized-agent-backend.onrender.com:443;
    }

    upstream frontend {
        server energized-frontend.onrender.com:443;
    }

    server {
        listen 80;

        # ── RAG API ───────────────────────────────────────────────────────────
        location /rag/api/ {
            proxy_pass https://energized-rag.onrender.com/;
            proxy_ssl_server_name on;
            proxy_set_header Host energized-rag.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }

        # ── Agent API ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass https://energized-agent-backend.onrender.com/;
            proxy_ssl_server_name on;
            proxy_set_header Host energized-agent-backend.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;

            # SSE support for streaming responses
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # ── Frontend (catch-all) ──────────────────────────────────────────────
        location / {
            proxy_pass https://energized-frontend.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host energized-frontend.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }
    }
}