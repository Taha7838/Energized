# ─── Energized — docker-compose.yml ──────────────────────────────────────────
# Spins up all three services behind an nginx reverse proxy.
#
# Usage:
#   docker compose --env-file agent/backend/.env --env-file rag/.env up -d --wait
#
# Required env vars (put in a root .env or pass inline):
#   GEMINI_API_KEY      — Google AI Studio key
#   TAVILY_API_KEY      — Tavily search key (agent backend only)
#
# Ports exposed on the host:
#   http://localhost      → frontend (nginx, port 80)
#   /api/*               → agent backend (proxied)
#   /rag/api/*           → RAG backend (proxied)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Agent Backend (FastAPI + CrewAI) ───────────────────────────────────────
  agent-backend:
    build:
      context: ./agent/backend
      dockerfile: Dockerfile
    image: energized-agent:local
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - energized-net

  # ── RAG Backend (FastAPI + ChromaDB + Gemini) ───────────────────────────────
  rag-backend:
    build:
      context: ./rag
      dockerfile: Dockerfile
    image: energized-rag:local
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    expose:
      - "8001"
    volumes:
      # Persist ChromaDB vector store across restarts
      - rag-chroma:/app/chroma_db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - energized-net

  # ── Frontend (React/Vite → nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./agent/frontend
      dockerfile: Dockerfile
    image: energized-frontend:local
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      agent-backend:
        condition: service_healthy
      rag-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - energized-net

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  rag-chroma:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  energized-net:
    driver: bridge
