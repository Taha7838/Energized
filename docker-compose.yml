# docker-compose.yml

services:

  # ── RAG Backend ────────────────────────────────────────────────────────────
  rag-backend:
    image: ${DOCKERHUB_USERNAME}/energized-rag:${IMAGE_TAG:-latest}
    container_name: rag-backend
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - rag_chroma:/app/chroma_db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Agent Backend ───────────────────────────────────────────────────────────
  agent-backend:
    image: ${DOCKERHUB_USERNAME}/energized-agent-backend:${IMAGE_TAG:-latest}
    container_name: agent-backend
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    volumes:
      - agent_chroma:/app/memory/chroma_store
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USERNAME}/energized-frontend:${IMAGE_TAG:-latest}
    container_name: frontend
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal
    depends_on:
      rag-backend:
        condition: service_healthy
      agent-backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

# ── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  rag_chroma:
    driver: local
  agent_chroma:
    driver: local

# ── Network ─────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge